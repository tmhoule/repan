# Synology NAS deployment for Velo (Repan)
# Cloudflare tunnel routes *.velo.hermes-tv.com → port 3060
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.synology.yml up -d --build

version: "3.8"
services:
  db:
    restart: unless-stopped

  app:
    ports:
      # Cloudflare tunnel routes to port 3060
      - "0.0.0.0:3060:3000"
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://repan:repan_dev@db:5432/repan"
      # Cloudflare handles TLS termination — disable secure cookie flag
      DISABLE_SECURE_COOKIES: "true"
      NEXT_PUBLIC_APP_NAME: "Velo"
      # Base domain for subdomain-based multi-tenant routing
      # e.g. acme.velo.hermes-tv.com → tenant slug "acme"
      APP_BASE_DOMAIN: "velo.hermes-tv.com"
